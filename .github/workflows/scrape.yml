name: Seguimiento de anuncios de coches

on:
  schedule:
    # Cada 8 horas. Cambia esta línea si quieres otra frecuencia.
    # Formato cron: minuto hora díaDelMes mes díaDeLaSemana (hora UTC)
    - cron: "0 */8 * * *"
  workflow_dispatch: {}   # permite lanzarlo manualmente desde la pestaña "Actions"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r scraper/requirements.txt

      - name: Ejecutar el seguimiento
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: python -m scraper.scraper

      - name: Subir HTML de diagnóstico (temporal)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: debug/
          if-no-files-found: ignore
          retention-days: 3

      - name: Guardar los resultados en el repositorio
        run: |
          git config user.name "car-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data/listings.json
          git diff --quiet --cached || git commit -m "Actualizacion automatica de precios [skip ci]"
          git push
